apiVersion: v1
kind: Pod
metadata:
  name: pv-pod
  namespace: roboshop
spec:
  containers:
   - name: nginx
     image: nginx
     volumeMounts:
      - name: volume-mount
        mountPath: /usr/share/nginx/html
  nodeSelector:
    topology.kubernetes.io/zone: us-east-1a
  volumes:
    - name: volume-mount
      persistentVolumeClaim:
        claimName: pv-claim