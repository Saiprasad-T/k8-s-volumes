apiVersion: v1
kind: Pod
metadata:
  name: pv-pod
  namespace: roboshop
spec:
  containers:
   - name: nginx
     image: nginx
     volumeMounts:
      - name: volume-mount
        mountPath: /usr/share/nginx/html
  # nodeSelector: #dynamic provisioning with WaitForFirstConsumer, Kubernetes automatically creates the volume in the same availability zone as the Pod
  #    topology.kubernetes.io/zone: us-east-1a
  volumes:
    - name: volume-mount
      persistentVolumeClaim:
        claimName: pv-claim